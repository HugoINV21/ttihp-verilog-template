# Tiny Tapeout project information
project:
  title: "Generador de la serie Fibonacci"       # Título del proyecto
  author: "Hugo nunez"                            # Tu nombre completo
  discord: ""                                    # Opcional, déjalo vacío
  description: "Genera la serie de Fibonacci (0,1,1,2,3,5,8,13,...) en cada ciclo de reloj"
  language: "Verilog"                            # Lenguaje usado
  clock_hz: 10000000                             # Frecuencia de reloj (10 MHz)
  tiles: "1x1"                                   # Tamaño que ocupa

  # Nombre del módulo principal (debe coincidir con el archivo .v en src)
  top_module: "tt_um_HugoINV21_fibonacci"

  # Lista de archivos fuente (todos los .v que necesites)
  source_files:
    - "tt_um_HugoINV21_fibonacci.v"

  # Sección de pines (importante para la documentación)
  pinout:
    - pin: "ui_in"
      description: "No se usa, conectar a 0"
    - pin: "uo_out"
      description: "Salida con el número de Fibonacci"
    - pin: "uio_in"
      description: "No se usa"
    - pin: "uio_out"
      description: "No se usa"
    - pin: "uio_oe"
      description: "No se usa"
    - pin: "ena"
      description: "Habilitador (conectar a 1)"
    - pin: "clk"
      description: "Reloj del sistema"
    - pin: "rst_n"
      description: "Reset activo bajo (opcional)"